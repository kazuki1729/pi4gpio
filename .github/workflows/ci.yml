name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
          components: clippy, rustfmt

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build (host)
        run: cargo build --workspace

      - name: test
        run: cargo test --workspace

      - name: install aarch64 linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: build (aarch64 cross-check)
        run: cargo build --workspace --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  python-client-and-operations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install Python client
        run: python -m pip install -e clients/python

      - name: syntax check
        run: python -m compileall -q clients/python scripts

      - name: client recovery fault injection tests
        run: python -m unittest discover -s clients/python/tests -v

      - name: canary and systemd safety tests
        run: python -m unittest discover -s scripts/tests -v
