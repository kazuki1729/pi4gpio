# sensor-tiered-client.serviceがpi4gpioへ完全移行した時だけ配置するdrop-in。
# directバックエンドのまま適用すると、意図どおりセンサー初期化が失敗する。
[Service]
Environment=RPI_SENSOR_BACKEND=pi4gpio
Environment=PYTHONPATH=/home/pi/pi4gpio/clients/python

# 共有Pi全体の/dev権限は変えず、このサービスのcgroupだけから物理デバイスを
# 隠す。クライアントは/run/pi4gpio/pi4gpio.sock経由でdaemonへ接続できる。
PrivateDevices=true
DevicePolicy=closed
NoNewPrivileges=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true
