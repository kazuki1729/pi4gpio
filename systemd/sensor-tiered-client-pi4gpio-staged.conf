# Week09 Ver2を専用venvからpi4gpio経由で動かす段階移行用drop-in。
# /etc/systemd/system/sensor-tiered-client.service.d/pi4gpio-exclusive.conf
# として配置する。元のunitとdirect用venvは変更しない。
[Unit]
Wants=pi4gpio.service
After=pi4gpio.service

[Service]
Environment=RPI_SENSOR_BACKEND=pi4gpio
Environment=PYTHONPATH=/home/pi/pi4gpio/clients/python

ExecStart=
ExecStart=/home/pi/pi4gpio-week09-v2/.venv/bin/python /home/pi/sensor-tiered-store/client/sensor_client_tiered.py

# 物理デバイスへのdirectアクセスをこのクライアントだけ禁止する。
# pi4gpiodのUnixソケットは/dev外にあるためアクセスできる。
PrivateDevices=true
DevicePolicy=closed
NoNewPrivileges=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true
